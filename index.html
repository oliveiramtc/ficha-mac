<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha Clínica MTC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1612;
    --ink-muted: #6b6259;
    --ink-faint: #b0a89e;
    --paper: #f5f0ea;
    --paper-warm: #ede7df;
    --paper-card: #faf7f3;
    --accent: #8b3a2a;
    --accent-light: #c47a5e;
    --accent-faint: #f0e0d8;
    --green: #3a6b4a;
    --green-faint: #dceee3;
    --border: #d8cfc6;
    --shadow: 0 2px 12px rgba(26,22,18,0.08);
    --shadow-lg: 0 8px 32px rgba(26,22,18,0.12);
    --radius: 4px;
    --radius-lg: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--paper);
    color: var(--ink);
    font-size: 13px;
    min-height: 100vh;
  }

  /* ── LAYOUT ── */
  .shell {
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: 56px 1fr;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    grid-column: 1 / -1;
    background: var(--ink);
    color: var(--paper);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--paper);
  }
  .header-logo span { color: var(--accent-light); font-style: italic; }
  .header-sep { flex: 1; }
  .header-status {
    font-size: 11px;
    color: var(--ink-faint);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #888;
    transition: background 0.3s;
  }
  .status-dot.ok { background: #5aad7a; }
  .status-dot.err { background: #c45a5a; }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--paper-warm);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-top {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .btn-new {
    background: var(--accent);
    color: white;
    border: none;
    padding: 9px 14px;
    border-radius: var(--radius);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.2s;
  }
  .btn-new:hover { background: #7a3020; }
  .search-wrap { position: relative; }
  .search-wrap input {
    width: 100%;
    padding: 7px 10px 7px 28px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--paper-card);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    outline: none;
  }
  .search-wrap input:focus { border-color: var(--accent-light); }
  .search-icon {
    position: absolute;
    left: 8px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-faint);
    font-size: 13px;
  }
  .patient-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .patient-item {
    padding: 10px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
  }
  .patient-item:hover { background: var(--accent-faint); }
  .patient-item.active {
    background: var(--accent-faint);
    border-left-color: var(--accent);
  }
  .patient-item-name {
    font-weight: 400;
    font-size: 13px;
    color: var(--ink);
  }
  .patient-item-meta {
    font-size: 11px;
    color: var(--ink-muted);
    margin-top: 2px;
  }
  .empty-list {
    padding: 24px 16px;
    text-align: center;
    color: var(--ink-faint);
    font-size: 12px;
    line-height: 1.8;
  }

  /* ── MAIN ── */
  .main {
    overflow-y: auto;
    background: var(--paper);
  }

  /* ── WELCOME SCREEN ── */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--ink-faint);
    text-align: center;
    padding: 48px;
  }
  .welcome-glyph {
    font-size: 64px;
    opacity: 0.15;
    font-family: 'Cormorant Garamond', serif;
  }
  .welcome h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 26px;
    color: var(--ink-muted);
  }
  .welcome p { font-size: 12px; line-height: 1.8; max-width: 320px; }

  /* ── SETUP SCREEN ── */
  .setup-screen {
    max-width: 600px;
    margin: 48px auto;
    padding: 32px;
    background: var(--paper-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
  }
  .setup-screen h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 400;
    margin-bottom: 8px;
  }
  .setup-screen p { color: var(--ink-muted); line-height: 1.7; margin-bottom: 16px; font-size: 12px; }
  .setup-screen ol { padding-left: 20px; color: var(--ink-muted); line-height: 2; font-size: 12px; margin-bottom: 16px; }
  .setup-screen code {
    background: var(--paper-warm);
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 11px;
    color: var(--accent);
  }
  .url-input-wrap { display: flex; gap: 8px; }
  .url-input-wrap input {
    flex: 1;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
    background: white;
  }
  .url-input-wrap input:focus { border-color: var(--accent); }
  .btn-primary {
    background: var(--accent);
    color: white;
    border: none;
    padding: 9px 18px;
    border-radius: var(--radius);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .btn-primary:hover { background: #7a3020; }
  .btn-secondary {
    background: transparent;
    color: var(--ink-muted);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: var(--radius);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--accent-light); color: var(--accent); }
  .btn-danger {
    background: transparent;
    color: #c45a5a;
    border: 1px solid #e8c0c0;
    padding: 7px 14px;
    border-radius: var(--radius);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
  }

  /* ── PATIENT VIEW ── */
  .patient-view {
    padding: 0;
  }
  .patient-header {
    background: var(--ink);
    color: var(--paper);
    padding: 20px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .patient-header-info { flex: 1; }
  .patient-header-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
  }
  .patient-header-meta {
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 4px;
  }
  .tab-bar {
    background: var(--paper-warm);
    border-bottom: 1px solid var(--border);
    display: flex;
    padding: 0 28px;
    gap: 0;
  }
  .tab {
    padding: 12px 18px;
    font-size: 12px;
    cursor: pointer;
    color: var(--ink-muted);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── FORM LAYOUT ── */
  .form-body { padding: 28px; }
  .section {
    margin-bottom: 32px;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--accent);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--accent-faint);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 18px;
    background: var(--accent);
    border-radius: 2px;
  }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
  .span-2 { grid-column: span 2; }
  .span-3 { grid-column: span 3; }

  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-muted);
  }
  .field input,
  .field select,
  .field textarea {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    background: var(--paper-card);
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus,
  .field select:focus,
  .field textarea:focus { border-color: var(--accent-light); background: white; }
  .field textarea { resize: vertical; min-height: 72px; }
  .field select { cursor: pointer; }

  /* Pulse grid */
  .pulse-grid {
    display: grid;
    grid-template-columns: 80px 1fr 1fr 1fr;
    gap: 6px;
    align-items: center;
  }
  .pulse-label {
    font-size: 11px;
    color: var(--ink-muted);
    letter-spacing: 0.06em;
    text-align: right;
    padding-right: 8px;
  }
  .pulse-pos {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    text-align: center;
    padding-bottom: 2px;
  }

  /* Checkboxes row */
  .check-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .check-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    font-size: 11px;
    color: var(--ink-muted);
    transition: all 0.15s;
    user-select: none;
  }
  .check-pill:hover { border-color: var(--accent-light); color: var(--accent); }
  .check-pill input { display: none; }
  .check-pill.checked {
    background: var(--accent-faint);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Save bar */
  .save-bar {
    position: sticky;
    bottom: 0;
    background: var(--paper-warm);
    border-top: 1px solid var(--border);
    padding: 12px 28px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 10;
  }
  .save-msg {
    font-size: 11px;
    color: var(--green);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .save-msg.show { opacity: 1; }

  /* Sessions */
  .sessions-list { padding: 0 28px 28px; }
  .session-card {
    background: var(--paper-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    margin-bottom: 12px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .session-card:hover { box-shadow: var(--shadow); }
  .session-card-header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    background: var(--paper-warm);
  }
  .session-date {
    font-size: 13px;
    font-weight: 400;
  }
  .session-queixa {
    font-size: 12px;
    color: var(--ink-muted);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .session-card-body {
    padding: 16px;
    display: none;
  }
  .session-card-body.open { display: block; }
  .new-session-btn-wrap {
    padding: 16px 28px 0;
  }

  /* Loading overlay */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px;
    color: var(--ink-faint);
    font-size: 12px;
    gap: 10px;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--ink);
    color: var(--paper);
    padding: 10px 18px;
    border-radius: var(--radius);
    font-size: 12px;
    z-index: 999;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { background: #7a2020; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,22,18,0.5);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--paper-card);
    border-radius: var(--radius-lg);
    padding: 28px;
    max-width: 380px;
    width: 90%;
    box-shadow: var(--shadow-lg);
  }
  .modal h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    margin-bottom: 8px;
  }
  .modal p { font-size: 12px; color: var(--ink-muted); line-height: 1.7; margin-bottom: 20px; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

  @media print {
    .sidebar, .header, .save-bar, .tab-bar, #lockScreen { display: none !important; }
    .shell { display: block; }
    .main { overflow: visible; }
  }

  /* ── LOCK SCREEN ── */
  #lockScreen {
    position: fixed;
    inset: 0;
    background: var(--ink);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .lock-card {
    background: var(--paper-card);
    border-radius: 12px;
    padding: 40px 44px 36px;
    width: 340px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .lock-glyph {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    color: var(--accent);
    margin-bottom: 4px;
    line-height: 1;
  }
  .lock-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--ink);
    margin-bottom: 2px;
    letter-spacing: 0.04em;
  }
  .lock-subtitle {
    font-size: 11px;
    color: var(--ink-faint);
    margin-bottom: 28px;
    letter-spacing: 0.06em;
  }
  .lock-input-wrap {
    width: 100%;
    position: relative;
    margin-bottom: 10px;
  }
  .lock-input-wrap input {
    width: 100%;
    padding: 11px 40px 11px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    letter-spacing: 0.25em;
    color: var(--ink);
    background: var(--paper);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    text-align: center;
  }
  .lock-input-wrap input:focus {
    border-color: var(--accent-light);
    box-shadow: 0 0 0 3px var(--accent-faint);
  }
  .lock-input-wrap input.shake {
    animation: shake 0.4s ease;
    border-color: #c45a5a;
  }
  .lock-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: var(--ink-faint);
    font-size: 15px;
    user-select: none;
  }
  .lock-toggle:hover { color: var(--ink-muted); }
  .lock-btn {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 0.2s;
    margin-bottom: 12px;
  }
  .lock-btn:hover { background: #7a3020; }
  .lock-error {
    font-size: 11px;
    color: #c45a5a;
    min-height: 16px;
    text-align: center;
    margin-bottom: 10px;
  }
  .lock-change-wrap {
    border-top: 1px solid var(--border);
    padding-top: 14px;
    width: 100%;
    text-align: center;
  }
  .lock-change-btn {
    background: none;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
    cursor: pointer;
    letter-spacing: 0.04em;
  }
  .lock-change-btn:hover { color: var(--ink-muted); text-decoration: underline; }
  .change-pw-panel {
    background: var(--paper-card);
    border-radius: 12px;
    padding: 28px 32px;
    width: 340px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    display: none;
    flex-direction: column;
    gap: 10px;
  }
  .change-pw-panel.open { display: flex; }
  .change-pw-panel h3 { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400; margin-bottom: 4px; }
  .change-pw-panel .cpw-field { display: flex; flex-direction: column; gap: 4px; }
  .change-pw-panel .cpw-field label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-muted); }
  .change-pw-panel .cpw-field input {
    padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius);
    font-family: 'DM Mono', monospace; font-size: 12px; outline: none; background: var(--paper);
  }
  .change-pw-panel .cpw-field input:focus { border-color: var(--accent-light); }
  .pw-msg { font-size: 11px; min-height: 16px; }
  .pw-msg.ok { color: var(--green); }
  .pw-msg.err { color: #c45a5a; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }
</style>
</head>
<body>

<!-- ── LOCK SCREEN ── -->
<div id="lockScreen">
  <div class="lock-card" id="lockCard">
    <div class="lock-glyph">針</div>
    <div class="lock-title">Ficha Clínica MTC</div>
    <div class="lock-subtitle">ACESSO RESTRITO</div>
    <div class="lock-input-wrap">
      <input type="password" id="lockInput" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') tryUnlock()">
      <span class="lock-toggle" onclick="toggleLockVis()" id="lockToggle">👁</span>
    </div>
    <div class="lock-error" id="lockError"></div>
    <button class="lock-btn" onclick="tryUnlock()">Entrar</button>
    <div class="lock-change-wrap">
      <button class="lock-change-btn" onclick="showChangePanel()">Alterar password</button>
    </div>
  </div>

  <div class="change-pw-panel" id="changePwPanel">
    <h3>Alterar Password</h3>
    <div class="cpw-field">
      <label>Password actual</label>
      <input type="password" id="cpwCurrent" placeholder="Password actual">
    </div>
    <div class="cpw-field">
      <label>Nova password</label>
      <input type="password" id="cpwNew" placeholder="Mínimo 4 caracteres">
    </div>
    <div class="cpw-field">
      <label>Confirmar nova password</label>
      <input type="password" id="cpwConfirm" placeholder="Repetir nova password">
    </div>
    <div class="pw-msg" id="pwMsg"></div>
    <button class="lock-btn" style="margin-bottom:0" onclick="changePassword()">Guardar nova password</button>
    <button class="lock-change-btn" style="margin-top:4px" onclick="hideChangePanel()">← Voltar</button>
  </div>
</div>

<div class="shell">
  <!-- HEADER -->
  <header class="header">
    <div class="header-logo">Ficha <span>Clínica</span> MTC</div>
    <div class="header-sep"></div>
    <div class="header-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">A configurar…</span>
    </div>
    <button class="btn-secondary" onclick="showSetup()" style="margin-left:12px;font-size:11px;">⚙ Configurar</button>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <button class="btn-new" onclick="newPatient()">+ Novo Paciente</button>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Pesquisar paciente…" oninput="filterPatients()">
      </div>
    </div>
    <div class="patient-list" id="patientList">
      <div class="empty-list">Configura o Google Sheets<br>para começar</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainArea">
    <div class="welcome">
      <div class="welcome-glyph">針</div>
      <h2>Bem-vindo à tua Ficha Clínica</h2>
      <p>Configura a ligação ao Google Sheets para guardar os dados dos teus pacientes na cloud.</p>
      <button class="btn-primary" onclick="showSetup()">Configurar agora</button>
    </div>
  </main>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODAL CONFIRMAÇÃO -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Confirmar</h3>
    <p id="modalMsg"></p>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-danger" id="modalConfirmBtn">Confirmar</button>
    </div>
  </div>
</div>

<script>
// ── AUTH ──
const DEFAULT_PASSWORD = 'mtc2024';
const PW_KEY = 'mtc_pw_hash';
const SESSION_KEY = 'mtc_session';
const INACTIVITY_MINUTES = 30;

function hashStr(s) {
  // Simple deterministic hash — not cryptographic but sufficient for local protection
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = Math.imul(31, h) + s.charCodeAt(i) | 0; }
  return String(h >>> 0);
}

function getStoredHash() {
  return localStorage.getItem(PW_KEY) || hashStr(DEFAULT_PASSWORD);
}

function isSessionValid() {
  const ts = sessionStorage.getItem(SESSION_KEY);
  if (!ts) return false;
  return (Date.now() - parseInt(ts)) < INACTIVITY_MINUTES * 60 * 1000;
}

function touchSession() {
  sessionStorage.setItem(SESSION_KEY, String(Date.now()));
}

function unlock() {
  touchSession();
  document.getElementById('lockScreen').style.display = 'none';
  resetInactivityTimer();
  // Boot app if first unlock this page load
  if (!window._appBooted) {
    window._appBooted = true;
    if (SCRIPT_URL) { setStatus('loading'); loadPatients(); }
    else { setStatus('noconfig'); }
  }
}

function tryUnlock() {
  const val = document.getElementById('lockInput').value;
  const errEl = document.getElementById('lockError');
  if (hashStr(val) === getStoredHash()) {
    errEl.textContent = '';
    unlock();
  } else {
    errEl.textContent = 'Password incorrecta. Tenta novamente.';
    const input = document.getElementById('lockInput');
    input.classList.add('shake');
    input.value = '';
    setTimeout(() => input.classList.remove('shake'), 450);
    input.focus();
  }
}

function toggleLockVis() {
  const inp = document.getElementById('lockInput');
  const tog = document.getElementById('lockToggle');
  if (inp.type === 'password') { inp.type = 'text'; tog.textContent = '🙈'; }
  else { inp.type = 'password'; tog.textContent = '👁'; }
}

function showChangePanel() {
  document.getElementById('lockCard').style.display = 'none';
  document.getElementById('changePwPanel').classList.add('open');
}
function hideChangePanel() {
  document.getElementById('lockCard').style.display = 'flex';
  document.getElementById('changePwPanel').classList.remove('open');
  document.getElementById('pwMsg').textContent = '';
  ['cpwCurrent','cpwNew','cpwConfirm'].forEach(id => document.getElementById(id).value = '');
}

function changePassword() {
  const cur = document.getElementById('cpwCurrent').value;
  const nw  = document.getElementById('cpwNew').value;
  const cf  = document.getElementById('cpwConfirm').value;
  const msg = document.getElementById('pwMsg');

  if (hashStr(cur) !== getStoredHash()) {
    msg.textContent = 'Password actual incorrecta.'; msg.className = 'pw-msg err'; return;
  }
  if (nw.length < 4) {
    msg.textContent = 'A nova password deve ter pelo menos 4 caracteres.'; msg.className = 'pw-msg err'; return;
  }
  if (nw !== cf) {
    msg.textContent = 'As passwords não coincidem.'; msg.className = 'pw-msg err'; return;
  }
  localStorage.setItem(PW_KEY, hashStr(nw));
  msg.textContent = '✓ Password alterada com sucesso!'; msg.className = 'pw-msg ok';
  setTimeout(() => { hideChangePanel(); unlock(); }, 1200);
}

// Inactivity lock — bloqueia após 30 min sem interacção
let inactivityTimer;
function resetInactivityTimer() {
  clearTimeout(inactivityTimer);
  touchSession();
  inactivityTimer = setTimeout(lockApp, INACTIVITY_MINUTES * 60 * 1000);
}
function lockApp() {
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('lockInput').value = '';
  document.getElementById('lockError').textContent = '';
  document.getElementById('lockScreen').style.display = 'flex';
  hideChangePanel();
}
// Reset timer on any user activity
['mousemove','keydown','click','touchstart'].forEach(evt =>
  document.addEventListener(evt, resetInactivityTimer, { passive: true })
);

// Add lock button to header (injected after DOM load)
function injectLockBtn() {
  const hdr = document.querySelector('.header');
  if (!hdr) return;
  const btn = document.createElement('button');
  btn.className = 'btn-secondary';
  btn.style.cssText = 'margin-left:8px;font-size:11px;';
  btn.textContent = '🔒 Bloquear';
  btn.onclick = lockApp;
  hdr.appendChild(btn);
}

// ── STATE ──
let SCRIPT_URL = localStorage.getItem('mtc_script_url') || '';
let allPatients = [];
let currentPatient = null;
let currentTab = 'dados';

// ── INIT ──
window.onload = () => {
  injectLockBtn();
  if (isSessionValid()) {
    window._appBooted = true;
    unlock();
    if (SCRIPT_URL) { setStatus('loading'); loadPatients(); }
    else setStatus('noconfig');
  } else {
    document.getElementById('lockScreen').style.display = 'flex';
    setTimeout(() => document.getElementById('lockInput').focus(), 100);
  }
};

// ── STATUS ──
function setStatus(s) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  if (s === 'ok') { dot.className = 'status-dot ok'; txt.textContent = 'Ligado ao Google Sheets'; }
  else if (s === 'err') { dot.className = 'status-dot err'; txt.textContent = 'Erro de ligação'; }
  else if (s === 'loading') { dot.className = 'status-dot'; txt.textContent = 'A carregar…'; }
  else { dot.className = 'status-dot'; txt.textContent = 'Sem configuração'; }
}

// ── SETUP ──
function showSetup() {
  document.getElementById('mainArea').innerHTML = `
    <div class="setup-screen">
      <h2>Configuração Google Sheets</h2>
      <p>Esta app guarda os dados no teu Google Sheets gratuitamente. Segue os passos abaixo uma única vez:</p>
      <ol>
        <li>Abre <strong>script.google.com</strong> e cria um novo projecto</li>
        <li>Abre também o Google Sheets que queres usar como base de dados</li>
        <li>No Apps Script, vai a <code>Recursos → Projecto do Google Cloud</code> ou usa <code>clasp</code></li>
        <li>Cola o conteúdo do ficheiro <code>apps_script_backend.js</code> no editor</li>
        <li>Clica em <strong>Implementar → Nova implementação → App Web</strong></li>
        <li>Em "Acesso", selecciona <strong>Qualquer pessoa</strong> e implementa</li>
        <li>Copia o URL da implementação e cola abaixo</li>
      </ol>
      <p style="color:var(--accent);font-style:italic;">Nota: o URL começa com <code>https://script.google.com/macros/s/…/exec</code></p>
      <div class="url-input-wrap">
        <input type="text" id="urlInput" placeholder="https://script.google.com/macros/s/…/exec" value="${SCRIPT_URL}">
        <button class="btn-primary" onclick="saveUrl()">Guardar</button>
      </div>
      <div style="margin-top:12px;">
        <button class="btn-secondary" onclick="testConnection()">Testar ligação</button>
      </div>
    </div>`;
}

function saveUrl() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url.startsWith('https://script.google.com')) {
    toast('URL inválido', true); return;
  }
  SCRIPT_URL = url;
  localStorage.setItem('mtc_script_url', SCRIPT_URL);
  toast('URL guardado');
  setStatus('loading');
  loadPatients();
}

async function testConnection() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) { toast('Introduz o URL primeiro', true); return; }
  toast('A testar…');
  try {
    const r = await api({ action: 'getPatients' }, url);
    if (Array.isArray(r)) toast('✓ Ligação bem-sucedida!');
    else toast('Erro: resposta inesperada', true);
  } catch {
    toast('Falha na ligação', true);
  }
}

// ── API ──
async function api(params, url) {
  const u = url || SCRIPT_URL;
  const qs = Object.entries(params).map(([k,v]) =>
    `${k}=${encodeURIComponent(typeof v === 'object' ? JSON.stringify(v) : v)}`
  ).join('&');
  // Google Apps Script requires follow redirects + credentials omitted for cross-origin
  const resp = await fetch(`${u}?${qs}`, {
    redirect: 'follow',
    credentials: 'omit',
    headers: { 'Accept': 'application/json' }
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

// ── PATIENTS ──
async function loadPatients() {
  try {
    const data = await api({ action: 'getPatients' });
    if (!Array.isArray(data)) throw new Error();
    allPatients = data;
    setStatus('ok');
    renderPatientList(allPatients);
    if (allPatients.length === 0) {
      document.getElementById('mainArea').innerHTML = `
        <div class="welcome">
          <div class="welcome-glyph">針</div>
          <h2>Nenhum paciente ainda</h2>
          <p>Clica em <strong>+ Novo Paciente</strong> para adicionar o primeiro registo.</p>
        </div>`;
    }
  } catch {
    setStatus('err');
    toast('Erro ao carregar pacientes', true);
  }
}

function renderPatientList(list) {
  const el = document.getElementById('patientList');
  if (list.length === 0) {
    el.innerHTML = '<div class="empty-list">Nenhum resultado</div>'; return;
  }
  el.innerHTML = list.map(p => `
    <div class="patient-item ${currentPatient?.id === p.id ? 'active' : ''}" onclick="openPatient('${p.id}')">
      <div class="patient-item-name">${p.nome || '(sem nome)'}</div>
      <div class="patient-item-meta">${p.dataNascimento ? calcAge(p.dataNascimento) + ' anos · ' : ''}${p.telemovel || ''}</div>
    </div>`).join('');
}

function filterPatients() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderPatientList(allPatients.filter(p => (p.nome||'').toLowerCase().includes(q) || (p.telemovel||'').includes(q)));
}

function calcAge(dob) {
  if (!dob) return '?';
  const d = new Date(dob);
  return Math.floor((Date.now() - d) / 31557600000);
}

function newPatient() {
  currentPatient = { id: null };
  currentTab = 'dados';
  renderPatientForm();
}

function openPatient(id) {
  const p = allPatients.find(x => x.id === id);
  if (!p) return;
  currentPatient = { ...p }; // local working copy — never mutate allPatients directly
  currentTab = 'dados';
  renderPatientForm();
  renderPatientList(allPatients);
}

// ── PATIENT FORM ──
function renderPatientForm() {
  // Always reads from currentPatient — single source of truth
  const p = currentPatient;
  const isNew = !p.id;
  document.getElementById('mainArea').innerHTML = `
    <div class="patient-view">
      <div class="patient-header">
        <div class="patient-header-info">
          <div class="patient-header-name">${p.nome || 'Novo Paciente'}</div>
          <div class="patient-header-meta">${p.id ? 'ID: ' + p.id : 'Ainda não guardado'} ${p.dataCriacao ? '· Criado em ' + new Date(p.dataCriacao).toLocaleDateString('pt-PT') : ''}</div>
        </div>
        ${!isNew ? `<button class="btn-danger" onclick="confirmDelete('${p.id}')">Eliminar</button>` : ''}
      </div>
      <div class="tab-bar">
        <div class="tab ${currentTab==='dados'?'active':''}" onclick="switchTab('dados')">Dados Pessoais</div>
        <div class="tab ${currentTab==='clinico'?'active':''}" onclick="switchTab('clinico')">Hist. Clínica</div>
        <div class="tab ${currentTab==='mtc'?'active':''}" onclick="switchTab('mtc')">Anamnese MTC</div>
        ${!isNew ? `<div class="tab ${currentTab==='sessoes'?'active':''}" onclick="switchTab('sessoes')">Sessões</div>` : ''}
      </div>
      <div id="tabContent"></div>
      <div class="save-bar">
        <button class="btn-primary" onclick="savePatient()">Guardar</button>
        <button class="btn-secondary" onclick="printPatient()">Imprimir</button>
        <span class="save-msg" id="saveMsg">✓ Guardado</span>
      </div>
    </div>`;
  renderTab();
}

function flushCurrentTab() {
  // Reads only the fields currently in the DOM — fields from other tabs are untouched.
  const g = id => { const el = document.getElementById(id); return el ? el.value : undefined; };
  const allFields = [
    'nome','dataNascimento','genero','nif','telemovel','email','morada','profissao','medicoFamilia',
    'motivoConsulta','historiaDDoenca','antecedentes','cirurgias','medicacaoAtual','alergias','habitos',
    'energia','sono','apetite','digestao','sede','urina','fezes','suores','temperatura','dor','emocoes',
    'linguaCorpo','linguaRevestimento','linguaForma','linguaUmidade',
    'pulsoDir1','pulsoDir2','pulsoDir3','pulsoEsq1','pulsoEsq2','pulsoEsq3','pulsoQualidade',
    'diagnosticoMTC','principioTratamento','notas'
  ];
  allFields.forEach(f => {
    const val = g('f_' + f);
    if (val !== undefined) currentPatient[f] = val;
  });
}

function switchTab(tab) {
  flushCurrentTab(); // merge visible fields into currentPatient before destroying DOM
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.trim().includes(tabLabel(tab))));
  renderTab();
}

function tabLabel(t) {
  return { dados:'Dados', clinico:'Hist.', mtc:'Anamnese', sessoes:'Sessões' }[t];
}

function renderTab() {
  // Always reads from currentPatient
  const p = currentPatient;
  const el = document.getElementById('tabContent');
  if (currentTab === 'dados') el.innerHTML = tabDados(p);
  else if (currentTab === 'clinico') el.innerHTML = tabClinico(p);
  else if (currentTab === 'mtc') el.innerHTML = tabMTC(p);
  else if (currentTab === 'sessoes') { el.innerHTML = ''; renderSessions(el, p); }
}

function tabDados(p) {
  return `<div class="form-body">
    <div class="section">
      <div class="section-title">Identificação</div>
      <div class="grid-2">
        <div class="field span-2"><label>Nome completo</label><input id="f_nome" value="${esc(p.nome)}"></div>
        <div class="field"><label>Data de nascimento</label><input type="date" id="f_dataNascimento" value="${esc(p.dataNascimento)}"></div>
        <div class="field"><label>Género</label><select id="f_genero"><option value="">-</option><option ${p.genero==='Masculino'?'selected':''}>Masculino</option><option ${p.genero==='Feminino'?'selected':''}>Feminino</option><option ${p.genero==='Outro'?'selected':''}>Outro</option></select></div>
        <div class="field"><label>NIF</label><input id="f_nif" value="${esc(p.nif)}"></div>

  return `<div class="form-body">

        <div class="field span-2"><label>História da doença actual</label><textarea id="f_historiaDDoenca">${esc(p.historiaDDoenca)}</textarea></div>
      </div>
    </div>

      <div class="section-title">Antecedentes</div>

        <div class="field span-2"><label>Cirurgias / internamentos</label><textarea id="f_cirurgias">${esc(p.cirurgias)}</textarea></div>
        <div class="field span-2"><label>Medicação actual</label><textarea id="f_medicacaoAtual">${esc(p.medicacaoAtual)}</textarea></div>

    </div>
  </div>`;
}

function tabMTC(p) {
  const sel = (id, val, opts) => `<select id="${id}">${opts.map(o=>`<option ${val===o?'selected':''}>${o}</option>`).join('')}</select>`;
  const corpoOpts = ['-','Pálida','Normal','Vermelha','Púrpura / violácea','Azulada','Esverdeada'];
  const revOpts = ['-','Branco','Branco espesso','Amarelo fino','Amarelo espesso','Cinzento','Preto','Sem revestimento'];

  return `<div class="form-body">

        <div class="field"><label>Urina</label><textarea id="f_urina" style="min-height:56px">${esc(p.urina)}</textarea></div>

        <div class="field"><label>Suores</label><textarea id="f_suores" style="min-height:56px">${esc(p.suores)}</textarea></div>
        <div class="field"><label>Sensação térmica</label><textarea id="f_temperatura" style="min-height:56px">${esc(p.temperatura)}</textarea></div>

        <div class="field span-2"><label>Estado emocional</label><textarea id="f_emocoes">${esc(p.emocoes)}</textarea></div>
      </div>
    </div>

      <div class="pulse-grid">

        <div class="pulse-label">Direito →</div>
        <div class="field">${sel('f_pulsoDir1',p.pulsoDir1,pulsoOpts)}</div>
        <div class="field">${sel('f_pulsoDir2',p.pulsoDir2,pulsoOpts)}</div>

      </div>
      <div class="field" style="margin-top:12px"><label>Qualidade geral / observações do pulso</label><textarea id="f_pulsoQualidade" style="min-height:56px">${esc(p.pulsoQualidade)}</textarea></div>

        <div class="field span-2"><label>Princípio de tratamento</label><textarea id="f_principioTratamento">${esc(p.principioTratamento)}</textarea></div>

}

// ── SESSIONS ──
async function renderSessions(el, p) {
  el.innerHTML = '<div class="loading"><div class="spinner"></div>A carregar sessões…</div>';
  const sessions = await api({ action: 'getSessions', patientId: p.id });
  const sorted = sessions.sort((a,b) => new Date(b.data) - new Date(a.data));

  const html = `
    <div class="new-session-btn-wrap">
      <button class="btn-primary" onclick="newSession('${p.id}')">+ Nova Sessão</button>
    </div>
    <div class="sessions-list" id="sessionsList">
      ${sorted.length === 0 ? '<div class="empty-list" style="padding:24px 0">Nenhuma sessão registada</div>' :
        sorted.map(s => sessionCard(s)).join('')}
    </div>`;
  el.innerHTML = html;
}

function sessionCard(s, expanded = false) {
  const d = s.data ? new Date(s.data).toLocaleDateString('pt-PT') : '—';
  return `<div class="session-card" id="sc_${s.id}">
    <div class="session-card-header" onclick="toggleSession('${s.id}')">
      <span class="session-date">📅 ${d}</span>
      <span class="session-queixa">${s.queixaPrincipal || 'Sem descrição'}</span>
      <span style="font-size:11px;color:var(--ink-faint)">▼</span>
    </div>
    <div class="session-card-body ${expanded?'open':''}" id="sb_${s.id}">
      <div class="grid-2" style="gap:12px">
        <div class="field"><label>Data</label><input type="date" id="sd_${s.id}_data" value="${s.data ? s.data.substring(0,10) : ''}"></div>
        <div class="field"><label>Queixa sessão</label><input id="sd_${s.id}_queixaPrincipal" value="${esc(s.queixaPrincipal)}"></div>
        <div class="field span-2"><label>Observações (língua, pulso, sintomas)</label><textarea id="sd_${s.id}_observacoes">${esc(s.observacoes)}</textarea></div>
        <div class="field span-2"><label>Pontos utilizados</label><textarea id="sd_${s.id}_pontosUsados" style="min-height:56px">${esc(s.pontosUsados)}</textarea></div>
        <div class="field"><label>Técnicas</label><input id="sd_${s.id}_tecnicas" value="${esc(s.tecnicas)}" placeholder="Agulha, Moxabustão, Cupping…"></div>
        <div class="field"><label>Resultado / resposta</label><input id="sd_${s.id}_resultado" value="${esc(s.resultado)}"></div>
        <div class="field span-2"><label>Plano próxima sessão</label><textarea id="sd_${s.id}_planoProxima" style="min-height:56px">${esc(s.planoProxima)}</textarea></div>
        <div class="field span-2"><label>Notas</label><textarea id="sd_${s.id}_notas">${esc(s.notas)}</textarea></div>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px">
        <button class="btn-primary" onclick="saveSession('${s.id}','${s.patientId}')">Guardar sessão</button>
      </div>
    </div>
  </div>`;
}

function toggleSession(id) {
  const el = document.getElementById(`sb_${id}`);
  el.classList.toggle('open');
}

async function newSession(patientId) {
  const data = { patientId, data: new Date().toISOString().substring(0,10) };
  const result = await api({ action: 'saveSession', data });
  if (result.error) { toast(result.error, true); return; }
  toast('Nova sessão criada');
  const p = allPatients.find(x => x.id === patientId) || currentPatient;
  const tabEl = document.getElementById('tabContent');
  await renderSessions(tabEl, p);
  // expand the newest
  const firstCard = document.querySelector('.session-card-body');
  if (firstCard) firstCard.classList.add('open');
}

async function saveSession(sessionId, patientId) {
  const g = id => { const el = document.getElementById(id); return el ? el.value : ''; };
  const data = {
    id: sessionId,
    patientId,
    data: g(`sd_${sessionId}_data`),
    queixaPrincipal: g(`sd_${sessionId}_queixaPrincipal`),
    observacoes: g(`sd_${sessionId}_observacoes`),
    pontosUsados: g(`sd_${sessionId}_pontosUsados`),
    tecnicas: g(`sd_${sessionId}_tecnicas`),
    resultado: g(`sd_${sessionId}_resultado`),
    planoProxima: g(`sd_${sessionId}_planoProxima`),
    notas: g(`sd_${sessionId}_notas`)
  };
  const result = await api({ action: 'saveSession', data });
  if (result.error) { toast(result.error, true); return; }
  toast('Sessão guardada');
}

// ── SAVE PATIENT ──
function getFormData() {
  const g = id => { const el = document.getElementById(id); return el ? el.value : ''; };
  const fields = ['nome','dataNascimento','genero','nif','telemovel','email','morada','profissao','medicoFamilia',
    'motivoConsulta','historiaDDoenca','antecedentes','cirurgias','medicacaoAtual','alergias','habitos',
    'energia','sono','apetite','digestao','sede','urina','fezes','suores','temperatura','dor','emocoes',
    'linguaCorpo','linguaRevestimento','linguaForma','linguaUmidade',
    'pulsoDir1','pulsoDir2','pulsoDir3','pulsoEsq1','pulsoEsq2','pulsoEsq3','pulsoQualidade',
    'diagnosticoMTC','principioTratamento','notas'];
  const data = {};
  fields.forEach(f => { data[f] = g('f_' + f); });
  return data;
}

async function savePatient() {
  flushCurrentTab(); // merge whatever tab is currently visible into currentPatient
  const data = { ...currentPatient }; // snapshot to send
  const result = await api({ action: 'savePatient', data });
  if (result.error) { toast(result.error, true); return; }

  if (!data.id) {
    data.id = result.id;
    currentPatient = data;
    allPatients.push(data);
  } else {
    const idx = allPatients.findIndex(p => p.id === data.id);
    if (idx >= 0) allPatients[idx] = data;
    currentPatient = data;
  }

  renderPatientList(allPatients);
  const msg = document.getElementById('saveMsg');
  if (msg) { msg.classList.add('show'); setTimeout(() => msg.classList.remove('show'), 2500); }
  toast('Paciente guardado');

  // Re-render header name
  const nameEl = document.querySelector('.patient-header-name');
  if (nameEl) nameEl.textContent = data.nome || 'Sem nome';
}

// ── DELETE ──
function confirmDelete(id) {
  document.getElementById('modalTitle').textContent = 'Eliminar Paciente';
  document.getElementById('modalMsg').textContent = 'Tens a certeza? Este paciente e todas as suas sessões serão removidos permanentemente.';
  document.getElementById('modalConfirmBtn').onclick = () => deletePatient(id);
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
async function deletePatient(id) {
  closeModal();
  const result = await api({ action: 'deletePatient', patientId: id });
  if (result.error) { toast(result.error, true); return; }
  allPatients = allPatients.filter(p => p.id !== id);
  currentPatient = null;
  renderPatientList(allPatients);
  document.getElementById('mainArea').innerHTML = `<div class="welcome"><div class="welcome-glyph">針</div><h2>Paciente eliminado</h2><p>Selecciona outro paciente ou cria um novo.</p></div>`;
  toast('Paciente eliminado');
}

// ── PRINT ──
function printPatient() {
  window.print();
}

// ── UTILS ──
function esc(v) {
  if (!v) return '';
  return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => el.className = 'toast', 2800);
}
</script>
